# ============================================================================
# HardcoreWipe – Konfigurace
# ============================================================================
#
# Nastavení chování pluginu. Všechny textové řetězce (hlášky, popisky, titulky)
# jsou v locale souborech – stačí v configu změnit locale: na "en" nebo "cz".
# ============================================================================

# Jazyk – "cz" (čeština) nebo "en" (angličtina)
locale: cz

config-version: 4


# ============================================================================
# ODPOČET
# ============================================================================

# Délka odpočtu v sekundách mezi smrtí hráče a wipe.
countdown-seconds: 30


# ============================================================================
# UPTIME (aktuálně odehraný čas na světě v action baru nad hotbarem)
# ============================================================================

uptime:
  enabled: true


# ============================================================================
# BOSS BAR
# ============================================================================

bossbar:
  # Barva bossbaru – RED, GREEN, BLUE, PURPLE, WHITE, PINK, YELLOW
  color: RED

  # Vzhled – SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
  style: SOLID


# ============================================================================
# ZVUKY
# ============================================================================

sounds:
  tick: "block.note_block.click"
  tick-pitch: 1.0
  alarm: "entity.experience_orb.pickup"
  alarm-pitch: 1.5


# ============================================================================
# SVĚTY (mazání world složek po wipu)
# ============================================================================

worlds:
  # true  = při wipu smazat world složky
  # false = pouze vytvořit wipe.txt a zastavit server
  enabled: true

  # true  = vytvořit wipe.txt v kořeni serveru (pro externí startovací script)
  create-wipe-flag: true

  # Seznam world složek k smazání
  list:
    - "world"

  # Staré oddělené složky pro Paper migraci
  remove-legacy-folders:
    - "world_nether"
    - "world_the_end"


# ============================================================================
# MOTD
# ============================================================================

motd:
  enabled: true
  text: "§6§lHARDCORE WIPE §7- §cSmrt = reset světa"


# ============================================================================
# SERVER PROPERTIES
# ============================================================================

server-properties:
  enabled: true
  hardcore: true
  difficulty: hard


# ============================================================================
# DISCORD WEBHOOK
# ============================================================================

discord-webhook:
  enabled: false
  url: ""
  bot-name: ""
  avatar-url: ""

  embed:
    enabled: true
    color: 16711680
